<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="お子様の可能性を広げる第一歩は、ここから - GCG">
    <title>GCG - 生徒募集中</title>
    <!-- cssやフォントの読み込みは後ほど追加します -->
</head>
<body>

    <!-- =========================
         HEADER
    ========================= -->
    <header class="header">
        <div class="header__inner">
            <h1 class="header__logo">
                <!-- Gakken / GCG ロゴ -->
            </h1>
            <nav class="header__nav">
                <a href="#cta" class="btn btn--trial">体験会<br>申し込み</a>
                <a href="#contact" class="btn btn--contact">お問い合わせ</a>
            </nav>
        </div>
    </header>

    <main>
        <!-- =========================
             HERO (メインビジュアル)
        ========================= -->
        <section class="hero" id="hero">
            <div class="hero__inner">
                <!-- 「4月10日(水)グランドオープン！」「生徒募集中」などのテキストと子供の画像 -->
            </div>
        </section>

        <!-- =========================
             CONCEPT (導入部・事業説明)
        ========================= -->
        <section class="concept" id="concept">
            <div class="concept__inner">
                <!-- 「自ら考える力...」のテキスト、GCGロゴの説明 -->
            </div>
        </section>

        <!-- =========================
             FEATURES (教育の特長)
        ========================= -->
        <section class="features" id="features">
            <div class="features__inner">
                <!-- 「教育の特長」タイトルと、3つの特徴カード（思考力・表現力など） -->
            </div>
        </section>

        <!-- =========================
             COURSES (コース紹介・料金案内)
        ========================= -->
        <section class="courses" id="courses">
            <div class="courses__inner">
                <!-- 「お子様に合わせた2つのコース」タイトル、左右にスライド/切り替えできるコース表と料金表 -->
            </div>
        </section>

        <!-- =========================
             ADMISSION (入会金・諸費用)
        ========================= -->
        <section class="admission" id="admission">
            <div class="admission__inner">
                <!-- 入会金、施設維持費、その他注意事項などの表・テキスト -->
            </div>
        </section>

        <!-- =========================
             REVIEWS & GALLERY (お客様の声とギャラリー)
        ========================= -->
        <section class="reviews" id="reviews">
            <div class="reviews__inner">
                <!-- 「ご利用いただいたお客様の声」タイトル、4つの評価カードと下部の写真ギャラリー -->
            </div>
        </section>

        <!-- =========================
             CTA (コールトゥアクション)
        ========================= -->
        <section class="cta" id="cta">
            <div class="cta__inner">
                <!-- 「お子様の可能性を広げる第一歩は、ここから」 -->
                <!-- 体験教室申し込みボタンとInstagramフォローボタン -->
            </div>
        </section>
    </main>

    <!-- =========================
         FOOTER
    ========================= -->
    <footer class="footer">
        <div class="footer__inner">
            <!-- 連絡先、住所等の会社情報 -->
        </div>
        <div class="footer__bottom">
            <!-- Gakkenのロゴ -->
        </div>
    </footer>

</body>
</html>
